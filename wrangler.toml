name = "autoclaw-worker"
main = "src/index.ts"
compatibility_date = "2024-12-30"

# Environment variables — set via `wrangler secret put <KEY>`
# Required:
# - DATABASE_URL
# - WORKER_AUTH_SECRET
#
# Optional integrations:
# - CONTENT_DATABASE_URL (for content_gen agent)
# - HUNTER_API_KEY, SNOV_API_ID, SNOV_API_SECRET, BREVO_API_KEY
# - AI_GATEWAY_API_KEY, ANTHROPIC_API_KEY, CEREBRAS_API_KEY
# - GITHUB_TOKEN

[vars]
ENVIRONMENT = "development"

# Self service binding — allows the worker to call itself, creating a new
# invocation with a fresh 50-subrequest budget.  Used by /run-all to chain
# tasks without hitting the Cloudflare subrequest limit.
[[services]]
binding = "SELF"
service = "autoclaw-worker"

# Cron Triggers — replaces the Vercel `crons` block that was removed from
# autoclaw-web/vercel.json (Hobby plan only allows daily; CF Free allows any
# cadence). Single hourly trigger fans out to autoclaw-web /api/cron/* via
# `dispatchVercelCrons` in src/index.ts based on UTC hour. To extend
# behavior, edit that function — don't add more triggers here (CF Free is
# capped at 3 per worker; one is plenty with internal routing).
#
# Required secrets (set with `wrangler secret put <KEY>`):
#   - AUTOCLAW_WEB_URL   e.g. https://autoclaw.jytech.us
#   - CRON_SECRET        same value as autoclaw-web's CRON_SECRET env var
[triggers]
crons = ["0 * * * *"]
