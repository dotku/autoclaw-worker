name = "autoclaw-worker"
main = "src/index.ts"
compatibility_date = "2024-12-30"

# Environment variables — set via `wrangler secret put <KEY>`
# Required:
# - DATABASE_URL
# - WORKER_AUTH_SECRET
#
# Optional integrations:
# - CONTENT_DATABASE_URL (for content_gen agent)
# - HUNTER_API_KEY, SNOV_API_ID, SNOV_API_SECRET, BREVO_API_KEY
# - AI_GATEWAY_API_KEY, ANTHROPIC_API_KEY, CEREBRAS_API_KEY
# - GITHUB_TOKEN

[vars]
ENVIRONMENT = "development"

# This template does not set a native Cloudflare cron trigger by default.
# You can call POST /cron from an external scheduler (Vercel cron, GitHub Actions, etc.)
# or add [triggers] in this file if you want Cloudflare native scheduling.
